<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración de Usuarios - PNK Inmobiliaria</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <div class="logo-text">PNK INMOBILIARIA</div>
            <img src="img/portal.jpg" alt="Portal Inmobiliario" class="portal-logo">
        </div>
        <nav class="dashboard-nav">
            <ul>
                <li><a href="mantenedor_usuarios.html" class="active"><i class="fas fa-users"></i> Usuarios</a></li>
                <li><a href="mantenedor_propiedades.html"><i class="fas fa-home"></i> Propiedades</a></li>
                <li><a href="#"><i class="fas fa-user-cog"></i> Mi Perfil</a></li>
                <li><a href="index.html"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a></li>
            </ul>
        </nav>
    </header>

    <main class="dashboard-content">
        <h1><i class="fas fa-users"></i> Administración de Usuarios</h1>
        <section class="dashboard-section">
            <h2><i class="fas fa-plus-circle"></i> Ingresar Nuevo Usuario</h2>
            <form class="crud-form" id="user-form">
                <div class="form-grupo">
                    <label for="user-rut"><i class="fas fa-id-card"></i> Rut:</label>
                    <input type="text" id="user-rut" name="user-rut" placeholder="Ej: 12.345.678-9">
                </div>
                <div class="form-grupo">
                    <label for="user-nombre"><i class="fas fa-signature"></i> Nombre Completo:</label>
                    <input type="text" id="user-nombre" name="user-nombre" placeholder="Ingrese nombre completo">
                </div>
                <div class="form-grupo">
                    <label for="user-email"><i class="fas fa-envelope"></i> Correo Electrónico:</label>
                    <input type="email" id="user-email" name="user-email" placeholder="Ingrese correo">
                </div>
                <div class="form-grupo">
                    <label for="user-tipo"><i class="fas fa-user-tag"></i> Tipo de Usuario:</label>
                    <select id="user-tipo" name="user-tipo">
                        <option value="administrador">Administrador</option>
                        <option value="propietario">Propietario</option>
                        <option value="gestor">Gestor Inmobiliario Free</option>
                    </select>
                </div>
                <button type="submit" class="crud-button"><i class="fas fa-save"></i> Guardar Usuario</button>
            </form>
        </section>

        <section class="dashboard-section">
            <h2><i class="fas fa-list-alt"></i> Listado de Usuarios</h2>
            <table class="crud-table" id="user-table">
                <thead>
                    <tr>
                        <th>Rut</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Tipo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>11.222.333-4</td>
                        <td>Juan Pérez</td>
                        <td>juan@example.com</td>
                        <td>Propietario</td>
                        <td>
                            <button class="crud-button edit-button"><i class="fas fa-edit"></i> Editar</button>
                            <button class="crud-button delete-button"><i class="fas fa-trash-alt"></i> Eliminar</button>
                        </td>
                    </tr>
                    </tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 PNK Inmobiliaria. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
