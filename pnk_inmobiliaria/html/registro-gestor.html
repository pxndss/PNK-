<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse como Gestor - PNK Inmobiliaria</title>
    <link rel="stylesheet" href="../css/formularios.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="registro-container">
        <h2 class="registro-titulo"><i class="fas fa-user-tie"></i> Registrarse como Gestor Inmobiliario Free</h2>
        <form class="registro-form" id="registro-gestor">
            <div class="form-grupo">
                <label for="rut"><i class="fas fa-id-card"></i> Rut:</label>
                <input type="text" id="rut" name="rut" placeholder="Ej: 12.345.678-9" required>
            </div>

            <div class="form-grupo">
                <label for="nombre"><i class="fas fa-signature"></i> Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre completo" required>
            </div>

            <div class="form-grupo">
                <label for="fecha_nacimiento"><i class="fas fa-calendar-alt"></i> Fecha de Nacimiento:</label>
                <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" max="" required>
            </div>

            <div class="form-grupo">
                <label for="email"><i class="fas fa-envelope"></i> Correo Electrónico:</label>
                <input type="email" id="email" name="email" placeholder="Ingrese su correo electrónico" required>
            </div>

            <div class="form-grupo">
                <label for="password"><i class="fas fa-lock"></i> Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>
            </div>

            <div class="form-grupo">
                <label for="sexo"><i class="fas fa-venus-mars"></i> Sexo:</label>
                <select id="sexo" name="sexo" required>
                    <option value="">Seleccionar</option>
                    <option value="masculino">Masculino</option>
                    <option value="femenino">Femenino</option>
                    <option value="otro">Otro</option>
                </select>
            </div>

            <div class="form-grupo">
                <label for="telefono"><i class="fas fa-phone"></i> Teléfono Móvil:</label>
                <input type="tel" id="telefono" name="telefono" placeholder="Ej: +56912345678" required>
            </div>

            <div class="form-grupo">
                <label for="certificado"><i class="fas fa-file-alt"></i> Certificado de Antecedentes:</label>
                <input type="file" id="certificado" name="certificado" required>
            </div>

            <button type="submit" class="registro-boton"><i class="fas fa-check-circle"></i> Registrarme como GESTOR</button>
        </form>
        <div class="registro-enlace">
            ¿Ya tienes una cuenta? <a href="login.html">Iniciar Sesión</a>
        </div>
    </div>

    <script>
        // Obtener el campo de fecha
        const fechaNacimientoInput = document.getElementById('fecha_nacimiento');

        // Obtener la fecha actual en formato AAAA-MM-DD
        const hoy = new Date().toISOString().split('T')[0];

        // Establecer el atributo max
        fechaNacimientoInput.setAttribute('max', hoy);
    </script>
</body>

</html>
