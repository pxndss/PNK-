<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Propietario</title>
    <link rel="stylesheet" href="../css/formularios.css">
</head>

<body>
    <form id="registro-gestor">
        <h2>Registro de Gestor Inmobiliario Free</h2>

        <label for="rut">Rut:</label>
        <input type="text" id="rut" name="rut" required>

        <label for="nombre">Nombre Completo:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="fecha_nacimiento">Fecha de Nacimiento:</label>
        <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>

        <label for="email">Correo Electrónico:</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required>

        <label for="sexo">Sexo:</label>
        <select id="sexo" name="sexo" required>
            <option value="">Seleccionar</option>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
            <option value="otro">Otro</option>
        </select>

        <label for="telefono">Teléfono Móvil:</label>
        <input type="tel" id="telefono" name="telefono" required>

        <label for="certificado">Certificado de Antecedentes:</label>
        <input type="file" id="certificado" name="certificado" required>

        <button type="submit">Registrarme como GESTOR INMOBILIARIO FREE</button>
    </form>
</body>

</html>
